# know_trans — SAME-FAMILY pilot: Llama-3.1-8B (teacher) -> Llama-3.2-1B (student)
#
# The "near" point of the family-distance axis (contrast with the cross-family
# Qwen3-0.6B pair). Both are Llama-3 family and share the SAME tokenizer
# (vocab 128256), so token-level alignment is even possible here (the pipeline
# still pools at example level for a fair comparison with the cross-family arm).
# Teacher activations + SAEs are already trained and reused as-is.

seed: 0

teacher:
  name: Llama-3.1-8B
  path: /share1/zhlu6105/models/Llama-3.1-8B
  family: llama
  layers: [8, 16, 24]      # 32-layer -> ~25/50/75% (already captured + SAEs trained)
  dtype: bfloat16

student:
  name: Llama-3.2-1B
  path: /share1/zhlu6105/models/Llama-3.2-1B
  family: llama
  layers: [4, 8, 12]       # 16-layer -> ~25/50/75% depth
  dtype: bfloat16

sae:
  d_hidden: 16384          # matched dictionary size (Llama-1B d_in 2048 -> 8x over-complete)
  expansion: 16
  k: 32
  lr: 0.0004
  batch_size: 4096
  steps: 8000
  aux_k: 256
  aux_coef: 0.03125
  activation: topk

capture:
  corpus: benchmarks
  n_texts: 20000
  max_len: 256
  batch_size: 32
  hook_point: mlp

distill:
  lambda_concept: 1.0
  freeze_saes: true
  lr: 0.00001
  steps: 2000
  pool: mean

paths:
  models: /share1/zhlu6105/models
  benchmarks: /share1/zhlu6105/benchmarks
  data: /share1/zhlu6105/know_trans_data
